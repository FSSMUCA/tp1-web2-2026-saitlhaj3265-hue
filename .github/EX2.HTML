<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <title>Exercice 2 - Variables let</title>
</head>
<body>
    <h1>Exercice 2</h1>
    <p>Ouvrez la console pour voir les résultats</p>

    <script>
        let prenom = "Mariem";
        let age = 20;
        let ville = "Marrakech";
        let taille = 1.75;
        let aimeJS = true;

        console.log("Prénom :", prenom);
        console.log("Âge :", age);
        console.log("Ville :", ville);
        console.log("Taille :", taille, "m");
        console.log("Aime le JS :", aimeJS);

        age = age + 1; 
        console.log("Nouvel âge (après anniversaire) :", age);
    </script>
</body>
</html>
