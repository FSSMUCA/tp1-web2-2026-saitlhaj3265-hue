<body>
    <h1>Exercice 3</h1>
    <p>Mini-calculatrice de TVA</p>

    <script>
        const TAUX_TVA = 0.20; 
        
        let prixHT = 150; 
        
        let montantTVA = TAUX_TVA * prixHT;
        let prixTTC = prixHT + montantTVA;
        
        console.log(`Prix HT : ${prixHT} € | TVA (20%) : ${montantTVA} € | Prix TTC : ${prixTTC} €`);
        
            console.log("TVA inchangée :", TAUX_TVA);
    </script>
</body>
